services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: webtoon
      POSTGRES_USER: webtoon
      POSTGRES_PASSWORD: webtoon
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U webtoon -d webtoon"]
      interval: 5s
      timeout: 3s
      retries: 20

  meilisearch:
    image: getmeili/meilisearch:v1.15
    environment:
      MEILI_MASTER_KEY: ${MEILI_API_KEY:-supersecret}
    ports:
      - "7700:7700"
    volumes:
      - meili_data:/meili_data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:7700/health"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ./backend
    depends_on:
      postgres:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:postgresql://postgres:5432/webtoon
      DB_USERNAME: webtoon
      DB_PASSWORD: webtoon
      JWT_SECRET: ${JWT_SECRET:-dev-webtoon-jwt-secret-change-me-0123456789}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-86400000}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:3000}
      MEILI_HOST: http://meilisearch:7700
      MEILI_API_KEY: ${MEILI_API_KEY:-supersecret}
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api/v1
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  postgres_data:
  meili_data:
